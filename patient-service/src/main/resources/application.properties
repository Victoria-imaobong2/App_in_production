spring.application.name=patient-service

spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb;TRACE_LEVEL_SYSTEM_OUT=2
spring.datasource.driver-class-name=org.h2.Driver

spring.datasource.username=admin_viewer
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=update

spring.sql.init.mode=always
# Shows the SQL queries in the console
spring.jpa.show-sql=true
# Formats the SQL so it's readable
spring.jpa.properties.hibernate.format_sql=true
# Logs the actual values (like patient names) sent to the DB
logging.level.org.hibernate.orm.jdbc.bind=trace

server.port=4000
